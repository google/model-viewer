<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phase 1: Multi-Model Test</title>
  <script type="module" src="./dist/model-viewer.js"></script>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
    model-viewer { width: 800px; height: 600px; background-color: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <model-viewer 
    src="../shared-assets/models/RobotExpressive.glb" 
    extra-srcs="../shared-assets/models/RobotExpressive.glb, ../shared-assets/models/RobotExpressive.glb, ../shared-assets/models/RobotExpressive.glb" 
    camera-controls auto-rotate>
  </model-viewer>
  <div style="position: absolute; bottom: 20px; text-align: center; width: 100%;">
    <button onclick="viewer.play({modelIndex: 0})">Play M0</button>
    <button onclick="viewer.pause({modelIndex: 0})">Pause M0</button>
    <button onclick="viewer.play({modelIndex: 1})">Play M1</button>
    <button onclick="viewer.pause({modelIndex: 1})">Pause M1</button>
    <button onclick="viewer.play({modelIndex: 2})">Play M2</button>
    <button onclick="viewer.pause({modelIndex: 2})">Pause M2</button>
    <button onclick="viewer.play({modelIndex: 3})">Play M3</button>
    <button onclick="viewer.pause({modelIndex: 3})">Pause M3</button>
    <button onclick="viewer.play()">Play All</button>
    <button onclick="viewer.pause()">Pause All</button>
  </div>
  <script>
    const viewer = document.querySelector('model-viewer');
    viewer.addEventListener('load', () => {
      // Phase 2 Verification: Change color of the first extra model
      if (viewer.extraModels && viewer.extraModels.length > 0) {
        const firstExtraModel = viewer.extraModels[0];
        const horseMaterial = firstExtraModel.materials[0];
        if (horseMaterial) {
          horseMaterial.pbrMetallicRoughness.setBaseColorFactor([1, 0, 0, 1]); // Red horse
        }
      }

      // Translate models so they aren't on top of each other
      const sceneSymbol = Object.getOwnPropertySymbols(viewer).find(s => s.description === 'scene');
      if (sceneSymbol) {
        const scene = viewer[sceneSymbol];
        if (scene && scene.models) {
          scene.models.forEach((model, index) => {
            model.position.x = (index - 1) * 2; // Space them out on the X axis
            model.updateMatrixWorld(true);
          });
          
          // Re-calculate bounding box and frame the camera to fit
          scene.updateBoundingBox();
          scene.updateFraming();
          scene.queueRender();
        }
      }

      // Phase 4 Verification: Click to get surface and position data per model
      viewer.addEventListener('click', (event) => {
        const rect = viewer.getBoundingClientRect();
        const pixelX = event.clientX - rect.left;
        const pixelY = event.clientY - rect.top;

        const surface = viewer.surfaceFromPoint(pixelX, pixelY);
        const positionAndNormal = viewer.positionAndNormalFromPoint(pixelX, pixelY);

        if (positionAndNormal) {
          console.log(`Clicked! Model Index: ${positionAndNormal.modelIndex}`);
          console.log('Surface string:', surface);
          console.log('Hit Details:', positionAndNormal);
        } else {
          console.log('Clicked, but no model was hit.');
        }
      });
    });
  </script>
</body>
</html>
